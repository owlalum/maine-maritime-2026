<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Maine &amp; Maritime 2026</title>
  <meta name="description" content="Steve, Carey &amp; Brad — 15-night road trip through Maine and Maritime Canada, May 22 – Jun 6, 2026.">

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0D2B45">

  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="M&amp;M 2026">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-shell">

    <section class="tab-section" id="tab-today" aria-labelledby="header-today">
      <header class="tab-header tab-header--today">
        <div class="tab-header-text">
          <h1 id="header-today" class="tab-title">Today</h1>
          <p class="tab-subtitle">May 22 – Jun 6, 2026</p>
        </div>
      </header>
      <div class="tab-content" id="today-content"></div>
    </section>

    <section class="tab-section" id="tab-timeline" aria-labelledby="header-timeline" hidden>
      <header class="tab-header">
        <div class="tab-header-text">
          <h1 id="header-timeline" class="tab-title">Trip Timeline</h1>
          <p class="tab-subtitle">May 22 – Jun 6, 2026</p>
        </div>
      </header>
      <div class="tab-content tab-content--timeline" id="timeline-content"></div>
    </section>

    <section class="tab-section" id="tab-bookings" aria-labelledby="header-bookings" hidden>
      <header class="tab-header">
        <div class="tab-header-text">
          <h1 id="header-bookings" class="tab-title">Bookings</h1>
          <p class="tab-subtitle">May 22 – Jun 6, 2026</p>
        </div>
      </header>
      <div class="tab-content tab-content--bookings" id="bookings-content"></div>
    </section>

    <section class="tab-section" id="tab-expenses" aria-labelledby="header-expenses" hidden>
      <header class="tab-header">
        <div class="tab-header-text">
          <h1 id="header-expenses" class="tab-title">Expenses</h1>
          <p class="tab-subtitle">May 22 – Jun 6, 2026</p>
        </div>
        <span class="tab-daterange tab-daterange--total" id="expenses-header-total" aria-label="Running total in USD">$0.00</span>
      </header>
      <div class="tab-content tab-content--expenses" id="expenses-content"></div>
    </section>

    <section class="tab-section" id="tab-info" aria-labelledby="header-info" hidden>
      <header class="tab-header">
        <div class="tab-header-text">
          <h1 id="header-info" class="tab-title">Trip Info</h1>
          <p class="tab-subtitle">May 22 – Jun 6, 2026</p>
        </div>
      </header>
      <div class="tab-content tab-content--info" id="info-content"></div>
    </section>

    <nav class="tab-bar" role="tablist" aria-label="Primary">
      <button type="button" class="tab-button" role="tab" data-tab="today" aria-controls="tab-today">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <span class="tab-label">Today</span>
      </button>
      <button type="button" class="tab-button" role="tab" data-tab="timeline" aria-controls="tab-timeline">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6 4a2 2 0 100 4 2 2 0 000-4zM18 16a2 2 0 100 4 2 2 0 000-4zM6 8v4a4 4 0 004 4h4a4 4 0 014 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="tab-label">Timeline</span>
      </button>
      <button type="button" class="tab-button" role="tab" data-tab="bookings" aria-controls="tab-bookings">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M5 4h14v16l-7-3-7 3V4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="tab-label">Bookings</span>
      </button>
      <button type="button" class="tab-button" role="tab" data-tab="expenses" aria-controls="tab-expenses">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 2v20M17 6.5a4 4 0 00-4-2.5h-2a3.5 3.5 0 000 7h2a3.5 3.5 0 010 7h-2.5a4 4 0 01-4-2.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tab-label">Expenses</span>
      </button>
      <button type="button" class="tab-button" role="tab" data-tab="info" aria-controls="tab-info">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M12 11v5M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tab-label">Info</span>
      </button>
    </nav>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" defer></script>
  <script src="./js/firebase.js" defer></script>
  <script src="./js/data.js" defer></script>
  <script src="./js/app.js" defer></script>
</body>
</html>
